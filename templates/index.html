<!DOCTYPE html>
<html>

<head>

<title>Cloud Auto Scaling Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:20px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:30px;
}

.card{
background:#1e293b;
padding:20px;
width:220px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.status{
margin-top:20px;
font-size:18px;
color:#38bdf8;
}

canvas{
background:white;
border-radius:10px;
margin-top:30px;
}

</style>

</head>

<body>

<h1>Cloud Auto Scaling Dashboard</h1>

<div class="status">
Scaling Decision: <span id="decision">Loading...</span>
</div>

<div class="status">
Local Machine CPU: <span id="localcpu"></span> |
Memory: <span id="localmem"></span>
</div>

<div class="container" id="servers"></div>

<h2>CPU Load Distribution</h2>
<canvas id="cpuChart" width="600" height="300"></canvas>

<h2>Scaling History</h2>
<canvas id="historyChart" width="600" height="300"></canvas>

<script>

let cpuChart
let historyChart

function fetchMetrics(){

fetch("/metrics")

.then(res=>res.json())

.then(data=>{

document.getElementById("decision").innerText=data.decision
document.getElementById("localcpu").innerText=data.local_cpu+"%"
document.getElementById("localmem").innerText=data.local_memory+"%"

let serverDiv=document.getElementById("servers")
serverDiv.innerHTML=""

let labels=[]
let cpuValues=[]

for(let server in data.servers){

let s=data.servers[server]

serverDiv.innerHTML+=`
<div class="card">
<h3>${server}</h3>
CPU: ${s.cpu}% <br>
Memory: ${s.memory}%
</div>
`

labels.push(server)
cpuValues.push(s.cpu)

}

if(cpuChart){
cpuChart.destroy()
}

cpuChart=new Chart(
document.getElementById("cpuChart"),
{
type:"bar",
data:{
labels:labels,
datasets:[
{
label:"CPU Usage",
data:cpuValues
}
]
}
}
)

let time=[]
let instances=[]
let avgcpu=[]

data.history.forEach(h=>{
time.push(h.time)
instances.push(h.instances)
avgcpu.push(h.cpu)
})

if(historyChart){
historyChart.destroy()
}

historyChart=new Chart(
document.getElementById("historyChart"),
{
type:"line",
data:{
labels:time,
datasets:[
{
label:"Active Servers",
data:instances
},
{
label:"Average CPU",
data:avgcpu
}
]
}
}
)

})

}

setInterval(fetchMetrics,2000)

fetchMetrics()

</script>

</body>
</html>
